target-version = "py312"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "ANN",  # flake8-annotations
    "ASYNC",# flake8-async
    "RUF",  # ruff-specific
    "SIM",  # flake8-simplify
    "PL",   # pylint
]
ignore = [
    "ANN401", # allow Any when narrowing fails
    "PLR0913",# allow many positional args (FastAPI deps)
]

[lint.per-file-ignores]
"tests/**" = ["ANN", "PLR2004"]
