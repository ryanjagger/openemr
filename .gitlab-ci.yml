stages:
  - test
  - eval

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^rel-/'
    - when: never

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  UV_LINK_MODE: copy
  PYTHONUNBUFFERED: "1"

cache:
  key:
    files:
      - oe-ai-agent/pyproject.toml
      - oe-ai-agent/uv.lock
  paths:
    - .cache/pip
    - .cache/uv

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install uv
    - cd oe-ai-agent
    - uv sync --locked

oe_ai_agent_tests:
  stage: test
  script:
    - uv run pytest

oe_ai_agent_mock_chat_eval:
  stage: eval
  needs:
    - oe_ai_agent_tests
  script:
    - mkdir -p evals/runs
    - uv run python evals/run_chat_eval.py --label "gitlab-${CI_COMMIT_SHORT_SHA}" --provider mock --fail-on-expectations --output evals/runs/chat_gitlab.jsonl
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - oe-ai-agent/evals/runs/chat_gitlab.jsonl
